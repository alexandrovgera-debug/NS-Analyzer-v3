<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NS Analyzer v3</title>

    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

</head>

<body>

<div class="container">

    <header>

        <h1>NS Analyzer v3</h1>

        <div class="toolbar">

            <input
                id="url"
                type="text"
                placeholder="https://your-nightscout.site">

            <select id="daySelect"></select>

            <button id="analyze">
                Анализ
            </button>

        </div>

    </header>


    <section class="tables">

        <div class="basal-panel">

            <h2>Базальный профиль</h2>

            <table id="basalTable"></table>

        </div>


        <div class="right-panels">

            <div class="panel">

                <h2>CR</h2>

                <table id="crTable"></table>

            </div>

            <div class="panel">

                <h2>ISF</h2>

                <table id="isfTable"></table>

            </div>

        </div>

    </section>


    <section class="chartPanel">

        <h2>Глюкоза</h2>

        <canvas id="glucoseChart"></canvas>

    </section>


    <section class="chartPanel">

        <h2>Sensitivity Ratio</h2>

        <canvas id="srChart"></canvas>

    </section>


    <section class="chartPanel">

        <h2>COB / IOB</h2>

        <canvas id="cobChart"></canvas>

    </section>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
